# SPDX-License-Identifier: MIT
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSCN_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Build and install Python wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install -v ./python

      - name: Python tests
        run: |
          python -m pip install pytest
          python -m pytest python/tests -v

      - name: Python example
        run: python python/examples/hello_engine.py

  sanitize:
    name: ASan + UBSan (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DSCN_SANITIZE=address,undefined
          -DSCN_WARNINGS_AS_ERRORS=ON
          -DSCN_BUILD_PYTHON=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: ./scripts/format.sh --check
